spring:
  application:
    name: backend-java
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/imagesearch}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

integration:
  backend-ai:
    base-url: ${BACKEND_AI_BASE_URL:http://localhost:8000}
    health-path: /health
  qdrant:
    url: ${QDRANT_URL:http://localhost:6333}
