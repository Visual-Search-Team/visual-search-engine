name: visual-search-engine

services:
  postgres:
    image: postgres:16-alpine
    container_name: visualsearch-postgres
    environment:
      POSTGRES_DB: imagesearch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imagesearch"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: visualsearch-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: visualsearch-minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    command: server /data --console-address ":9001"

    volumes:
      - minio-data:/data
    restart: unless-stopped

  createbuckets:
    image: minio/mc
    container_name: visualsearch-createbuckets

    depends_on:
      minio:
        condition: service_started

    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 admin password123; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb local/images || true;
      mc anonymous set none local/images;
      exit 0;
      "

    restart: "no"

  backend-ai:
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    container_name: visualsearch-backend-ai
    environment:
      APP_ENV: docker
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      PYTHONUNBUFFERED: "1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: imagesearch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: images
      BACKEND_JAVA_URL: http://backend-java:8080

      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_BUCKET: images
      LORA_WEIGHTS_DIR: /app/lora-weights
      BASE_MODEL_CACHE: /app/base_model_cache
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./Lora_weights:/app/lora-weights:ro
      - base-model-cache:/app/base_model_cache
    restart: unless-stopped

  backend-java:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: visualsearch-backend-java
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/imagesearch
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      BACKEND_AI_BASE_URL: http://backend-ai:8000
      BACKEND_AI_MOCK_EMBEDDING: "false"
      QDRANT_URL: http://qdrant:6333

      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_BUCKET: images
    depends_on:
      postgres:
        condition: service_healthy
      backend-ai:
        condition: service_healthy
      minio:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:
  minio-data:
  base-model-cache:
